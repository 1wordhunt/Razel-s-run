<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burak Developer - Subway Combat Boots</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; cursor: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: gold; font-size: 30px; text-shadow: 0 0 10px orange; pointer-events: none; }
        #instructions { position: absolute; bottom: 20px; width: 100%; text-align: center; color: white; font-size: 16px; opacity: 0.8; }
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
    </style>
</head>
<body>

<div id="ui">
    <div><b>DEVELOPER: BURAK</b></div>
    <div>SKOR: <span id="score">0</span></div>
</div>
<div id="instructions">Ok Tuşları: SAĞ/SOL | Boşluk: ZIPLA</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // --- SAHNE VE AYARLAR ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x1a1a2e, 10, 100); // Puslu bir hava
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true; // Gölgeler açık
    document.body.appendChild(renderer.domElement);

    // --- IŞIKLANDIRMA (Sinematik) ---
    const sun = new THREE.DirectionalLight(0xffaa00, 1.2);
    sun.position.set(10, 20, 10);
    sun.castShadow = true;
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0x404040));

    // --- YOL (SONSUZ HARİTA) ---
    const loader = new THREE.TextureLoader();
    const roadTexture = loader.load('road.jpg'); // Yüklediğin harita görseli
    roadTexture.wrapS = THREE.RepeatWrapping;
    roadTexture.wrapT = THREE.RepeatWrapping;
    roadTexture.repeat.set(1, 10); // Görseli tekrarla

    const roadGeo = new THREE.PlaneGeometry(10, 2000);
    const roadMat = new THREE.MeshPhongMaterial({ map: roadTexture });
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2; // Yere yatır
    road.receiveShadow = true;
    scene.add(road);

    // Şeffaf Ray Çizgileri
    const lineGeo = new THREE.PlaneGeometry(0.1, 2000);
    const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.1 });
    [-3.3, 0, 3.3].forEach(x => {
        const line = new THREE.Mesh(lineGeo, lineMat);
        line.rotation.x = -Math.PI / 2;
        line.position.set(x, 0.01, 0);
        scene.add(line);
    });

    // --- KARAKTER (BİLLBOARD SİSTEMİ) ---
    const charTexture = loader.load('char.png'); // Resim dosyan
    const charGeo = new THREE.PlaneGeometry(3, 4, 32, 32); // Yüksek çözünürlüklü düzlem
    const charMat = new THREE.MeshPhongMaterial({
        map: charTexture,
        transparent: true,
        bumpMap: charTexture, // Resmin kendisini Bump Map olarak kullan
        bumpScale: 0.2, // Ayakkabıları ve kıyafetleri kabartır
        shininess: 100 // Parlaklık ekle
    });
    const player = new THREE.Mesh(charGeo, charMat);
    player.position.set(0, 2, -5);
    player.castShadow = true;
    scene.add(player);

    // --- OYUN DEĞİŞKENLERİ ---
    let currentLane = 0; // -1: Sol, 0: Orta, 1: Sağ
    let score = 0;
    let speed = 0.5;
    const obstacles = [];
    const lanes = [-3.3, 0, 3.3];
    let jumping = false;
    let clock = new THREE.Clock();

    // --- HAREKET KONTROLÜ (Ok Tuşları & Zıplama) ---
    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' && currentLane > -1) currentLane--;
        if (e.key === 'ArrowRight' && currentLane < 1) currentLane++;
        if (e.key === ' ' && !jumping) jump();
    });

    function jump() {
        jumping = true;
        let jumpHeight = 0;
        const jumpInterval = setInterval(() => {
            player.position.y += 0.2;
            jumpHeight += 0.2;
            if(jumpHeight >= 3) {
                clearInterval(jumpInterval);
                const fallInterval = setInterval(() => {
                    player.position.y -= 0.2;
                    if(player.position.y <= 2) {
                        player.position.y = 2;
                        jumping = false;
                        clearInterval(fallInterval);
                    }
                }, 20);
            }
        }, 20);
    }

    // --- ENGEL ÜRETİMİ (Kırmızı Kutular) ---
    function spawnObstacle() {
        const geo = new THREE.BoxGeometry(2, 2, 2);
        const mat = new THREE.MeshPhongMaterial({ color: 0xff4444, shininess: 50 });
        const obs = new THREE.Mesh(geo, mat);
        const laneIdx = Math.floor(Math.random() * 3);
        obs.position.set(lanes[laneIdx], 1, -100);
        obs.castShadow = true;
        scene.add(obs);
        obstacles.push(obs);
    }
    setInterval(spawnObstacle, 1500);

    // --- OYUN DÖNGÜSÜ (Animasyon) ---
    function animate() {
        requestAnimationFrame(animate);
        let time = clock.getElapsedTime();

        // Sonsuz Yol Etkisi (Doku kayar)
        roadTexture.offset.y += speed * 0.05;

        // Karakter ray geçişi (Yumuşak geçiş)
        player.position.x = THREE.MathUtils.lerp(player.position.x, lanes[currentLane + 1], 0.1);

        // Koşma titremesi (3D hissi için, zıplamıyorsa)
        if(!jumping) player.position.y = 2 + Math.sin(time * 10) * 0.05;

        // Karakterin hep kameraya bakmasını sağla (Billboard)
        player.lookAt(camera.position.x, player.position.y, camera.position.z + 10);

        // Engelleri hareket ettir ve çarpışma kontrolü yap
        obstacles.forEach((obs, index) => {
            obs.position.z += speed;

            // Çarpışma Kontrolü
            if (Math.abs(player.position.z - obs.position.z) < 1.5 && 
                Math.abs(player.position.x - obs.position.x) < 1.5 &&
                player.position.y < 3) {
                alert("OYUN BİTTİ! SKORUN: " + Math.floor(score));
                location.reload();
            }

            // Ekrandan çıkanları temizle ve puan ekle
            if(obs.position.z > 10) {
                scene.remove(obs);
                obstacles.splice(index, 1);
                score += 10;
                document.getElementById('score').innerText = Math.floor(score);
                // Zorluk arttıkça hızı da artır
                if(score % 100 === 0 && speed < 1.5) speed += 0.05;
            }
        });

        // Kamera karakteri arkadan takip etsin
        camera.position.set(player.position.x * 0.5, 6, 8);
        camera.lookAt(player.position.x, 2, -10);

        renderer.render(scene, camera);
    }

    animate();

    // Ekran boyutunu ayarla
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
