<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Subway Run | Burak Developer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: #00ffff; font-size: 30px; font-weight: bold; text-shadow: 0 0 10px #00ffff; pointer-events: none; }
        #instructions { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #fff; font-size: 14px; letter-spacing: 2px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="score">0</span></div>
    <div id="instructions">TAP SIDES TO MOVE | CENTER TO JUMP</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <script>
        let scene, camera, renderer, player, clock;
        let score = 0;
        let obstacles = [];
        let isJumping = false;
        let jumpVelocity = 0;
        const lanes = [-3, 0, 3];
        let currentLane = 1; // Orta şerit

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 10, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);
            camera.lookAt(0, 2, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.HemisphereLight(0xffffff, 0x444444, 2);
            scene.add(light);

            // --- YOL (GROUND) ---
            const groundGeo = new THREE.PlaneGeometry(10, 1000);
            const groundMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Yol Çizgileri (Neon)
            for(let i=0; i<100; i++) {
                const lineGeo = new THREE.PlaneGeometry(0.2, 5);
                const lineMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
                const line = new THREE.Mesh(lineGeo, lineMat);
                line.rotation.x = -Math.PI / 2;
                line.position.set(0, 0.01, -i * 10);
                scene.add(line);
            }

            // --- SENİN KARAKTERİN (char.png) ---
            const loader = new THREE.TextureLoader();
            const charTexture = loader.load('char.png');
            charTexture.colorSpace = THREE.SRGBColorSpace;
            
            const charGeo = new THREE.PlaneGeometry(3, 5); 
            const charMat = new THREE.MeshBasicMaterial({ 
                map: charTexture, 
                transparent: true, 
                side: THREE.DoubleSide,
                depthWrite: false 
            });

            player = new THREE.Mesh(charGeo, charMat);
            player.position.set(lanes[currentLane], 2.5, 0);
            scene.add(player);

            clock = new THREE.Clock();

            // Kontroller
            window.addEventListener('touchstart', handleTouch);
            window.addEventListener('keydown', (e) => {
                if(e.key === "ArrowLeft" && currentLane > 0) currentLane--;
                if(e.key === "ArrowRight" && currentLane < 2) currentLane++;
                if(e.key === " " && !isJumping) { isJumping = true; jumpVelocity = 0.25; }
            });
        }

        function handleTouch(e) {
            const touchX = e.touches[0].clientX;
            const screenW = window.innerWidth;
            if(touchX < screenW * 0.3) { if(currentLane > 0) currentLane--; }
            else if(touchX > screenW * 0.7) { if(currentLane < 2) currentLane++; }
            else { if(!isJumping) { isJumping = true; jumpVelocity = 0.25; } }
        }

        function createObstacle() {
            if(Math.random() < 0.05) {
                const obsGeo = new THREE.BoxGeometry(2, 2, 2);
                const obsMat = new THREE.MeshPhongMaterial({ color: 0xff0055 });
                const obs = new THREE.Mesh(obsGeo, obsMat);
                obs.position.set(lanes[Math.floor(Math.random()*3)], 1, -50);
                scene.add(obs);
                obstacles.push(obs);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Karakter Hareket
            player.position.x = THREE.MathUtils.lerp(player.position.x, lanes[currentLane], 0.1);

            // Zıplama Mekaniği
            if(isJumping) {
                player.position.y += jumpVelocity;
                jumpVelocity -= 0.01;
                if(player.position.y <= 2.5) {
                    player.position.y = 2.5;
                    isJumping = false;
                }
            }

            // Engel Yönetimi
            createObstacle();
            for(let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].position.z += 0.5;
                
                // Çarpışma Testi
                if(Math.abs(obstacles[i].position.z - player.position.z) < 1 && 
                   Math.abs(obstacles[i].position.x - player.position.x) < 1 &&
                   player.position.y < 3) {
                    score = 0; // Çarpınca puan sıfırlanır
                }

                if(obstacles[i].position.z > 10) {
                    scene.remove(obstacles[i]);
                    obstacles.splice(i, 1);
                    score += 10;
                    document.getElementById('score').innerText = score;
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
